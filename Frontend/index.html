<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Ashus Global Chat 🚀</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Login / Register Section -->
    <div class="container" id="auth-container">
        <div class="card glass-effect">
            <div class="card-header">
                <h1>👋 Welcome Back!</h1>
                <p>Join the <span>Ashus Global Chat</span> 🌍</p>
            </div>
            <div class="form-group">
                <input type="text" id="username-input" placeholder="👤 Enter your username..." />
                <input type="password" id="password-input" placeholder="🔒 Enter your password..." />
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="login()">🚀 Login</button>
                <button class="btn btn-secondary" onclick="register()">✨ Register</button>
            </div>
            <p class="footer-text">Secure & Fast Messaging ⚡</p>
        </div>
    </div>

    <!-- Chat Section (Hidden initially) -->
    <div class="chat-wrapper hidden" id="chat-container">
        <div class="sidebar glass-effect">
            <div class="sidebar-header">
                <h3>💬 Chats</h3>
            </div>
            <ul class="user-list">
                <li class="active">🌐 Global Room</li>
                <li>🤖 Bot</li>
            </ul>
            <div class="user-profile">
                <div class="avatar">😎</div>
                <div class="user-info">
                    <span id="current-user">You</span>
                    <small>Online 🟢</small>
                </div>
            </div>
        </div>
        <div class="chat-area glass-effect">
            <div class="messages" id="messages">
                <div class="message system">🎉 Welcome to the chat! Start typing...</div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message... ✍️" />
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
